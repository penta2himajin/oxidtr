name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test

  self-host:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # Generate all targets
      - name: Generate Rust
        run: cargo run -- generate models/oxidtr.als --target rust --output generated
      - name: Generate TypeScript
        run: cargo run -- generate models/oxidtr.als --target ts --output generated-ts
      - name: Generate Kotlin
        run: cargo run -- generate models/oxidtr.als --target kt --output generated-kt
      - name: Generate Java
        run: cargo run -- generate models/oxidtr.als --target java --output generated-java
      - name: Generate Swift
        run: cargo run -- generate models/oxidtr.als --target swift --output generated-swift

      # Check structural consistency (all targets)
      - name: Check Rust
        run: cargo run -- check --model models/oxidtr.als --impl generated
      - name: Check TypeScript
        run: cargo run -- check --model models/oxidtr.als --impl generated-ts
      - name: Check Kotlin
        run: cargo run -- check --model models/oxidtr.als --impl generated-kt
      - name: Check Java
        run: cargo run -- check --model models/oxidtr.als --impl generated-java
      - name: Check Swift
        run: cargo run -- check --model models/oxidtr.als --impl generated-swift

      # Extract round-trip (each language → Alloy)
      - name: Extract Rust back to Alloy
        run: cargo run -- extract generated/ -o /tmp/mined-rust.als
      - name: Extract TypeScript back to Alloy
        run: cargo run -- extract generated-ts/ -o /tmp/mined-ts.als
      - name: Extract Kotlin back to Alloy
        run: cargo run -- extract generated-kt/ -o /tmp/mined-kt.als
      - name: Extract Java back to Alloy
        run: cargo run -- extract generated-java/ -o /tmp/mined-java.als
      - name: Extract Swift back to Alloy
        run: cargo run -- extract generated-swift/ -o /tmp/mined-swift.als

      # Verify enrichment (no invariants, no @alloy comments)
      - name: Verify enriched output
        run: |
          grep -q 'pub fn default_' generated/fixtures.rs
          grep -q 'export function default' generated-ts/fixtures.ts
          grep -q 'fun default' generated-kt/Fixtures.kt
          grep -q 'static ' generated-java/Fixtures.java
          grep -q '@NotNull' generated-java/Models.java
          grep -q 'func default' generated-swift/Fixtures.swift

      # Verify no invariants files (removed by design)
      - name: Verify no invariants files
        run: |
          test ! -f generated/invariants.rs
          test ! -f generated-ts/invariants.ts
          test ! -f generated-kt/Invariants.kt
          test ! -f generated-java/Invariants.java
          test ! -f generated-swift/Invariants.swift

      # Verify helpers (TC functions) exist where needed
      - name: Verify helpers files
        run: |
          test -f generated/helpers.rs
          test -f generated-ts/helpers.ts

      # Verify no @alloy comments in any generated code
      - name: Verify no @alloy comments
        run: |
          ! grep -r '@alloy:' generated/ generated-ts/ generated-kt/ generated-java/ generated-swift/

      # Verify TS validators exist
      - name: Verify TS validators
        run: test -f generated-ts/validators.ts

      # Verify inlined constraint expressions in tests
      - name: Verify inlined constraints
        run: |
          grep -q '.iter().all(' generated/tests.rs
          grep -q '.every(' generated-ts/tests.ts
          grep -q '.allSatisfy' generated-swift/Tests.swift

      # Combined self-extract: src/ + generated → full model coverage
      - name: Verify combined extract covers all model sigs
        run: |
          mkdir -p /tmp/oxidtr-combined
          cp -r src/* /tmp/oxidtr-combined/
          cp generated/*.rs /tmp/oxidtr-combined/
          cargo run -- extract /tmp/oxidtr-combined --lang rust -o /tmp/combined-extract.als
          # Count unique sigs in both models
          DOMAIN=$(grep -cE '^sig |^abstract sig |^one sig ' models/oxidtr-domain.als)
          INTERNAL=$(grep -cE '^sig |^abstract sig |^one sig ' models/oxidtr-internal.als)
          EXTRACTED=$(grep -cE '^sig |^abstract sig ' /tmp/combined-extract.als)
          echo "domain: $DOMAIN, internal: $INTERNAL, extracted: $EXTRACTED"
          # Every sig in domain model must be in extracted
          DOMAIN_MISSING=$(comm -23 <(grep -E '^sig |^abstract sig |^one sig ' models/oxidtr-domain.als | sed 's/[{].*//' | sed 's/ extends.*//' | awk '{print $NF}' | sort -u) <(grep -E '^sig |^abstract sig ' /tmp/combined-extract.als | sed 's/[{].*//' | sed 's/ extends.*//' | awk '{print $NF}' | sort -u) | wc -l)
          INTERNAL_MISSING=$(comm -23 <(grep -E '^sig |^abstract sig |^one sig ' models/oxidtr-internal.als | sed 's/[{].*//' | sed 's/ extends.*//' | awk '{print $NF}' | sort -u) <(grep -E '^sig |^abstract sig ' /tmp/combined-extract.als | sed 's/[{].*//' | sed 's/ extends.*//' | awk '{print $NF}' | sort -u) | wc -l)
          echo "domain missing: $DOMAIN_MISSING, internal missing: $INTERNAL_MISSING"
          test "$DOMAIN_MISSING" -eq 0 || { echo "FAIL: domain model has $DOMAIN_MISSING sigs not in extract"; exit 1; }
          test "$INTERNAL_MISSING" -eq 0 || { echo "FAIL: internal model has $INTERNAL_MISSING sigs not in extract"; exit 1; }
          echo "✓ Combined extract covers all model sigs (domain + internal)"

      # Verify cross-tests are marked as skipped/ignored
      - name: Verify cross-test markers
        run: |
          grep -q '#\[ignore\]' generated/tests.rs || echo "No cross-tests in Rust (OK)"
          grep -q 'it.skip(' generated-ts/tests.ts || echo "No cross-tests in TS (OK)"
          grep -q '@Disabled' generated-kt/Tests.kt || echo "No cross-tests in Kotlin (OK)"
          grep -q 'disabled_test_' generated-swift/Tests.swift || echo "No cross-tests in Swift (OK)"

  target-validation:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - uses: gradle/actions/setup-gradle@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run target validation tests
        run: cargo test --test target_validation -- --include-ignored
