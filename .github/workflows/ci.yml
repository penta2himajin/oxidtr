name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test

  self-host:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Generate Rust from self-hosting model
        run: cargo run -- generate models/oxidtr.als --target rust --output generated
      - name: Check Rust structural consistency
        run: cargo run -- check --model models/oxidtr.als --impl generated
      - name: Generate TypeScript from self-hosting model
        run: cargo run -- generate models/oxidtr.als --target ts --output generated-ts
      - name: Check TypeScript structural consistency
        run: cargo run -- check --model models/oxidtr.als --impl generated-ts
      - name: Generate Kotlin from self-hosting model
        run: cargo run -- generate models/oxidtr.als --target kt --output generated-kt
      - name: Check Kotlin structural consistency
        run: cargo run -- check --model models/oxidtr.als --impl generated-kt
      - name: Generate Java from self-hosting model
        run: cargo run -- generate models/oxidtr.als --target java --output generated-java
      - name: Check Java structural consistency
        run: cargo run -- check --model models/oxidtr.als --impl generated-java
